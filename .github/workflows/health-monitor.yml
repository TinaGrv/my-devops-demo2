name: Health Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: read

jobs:
  health_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run health check
        run: |
          HEALTH_JSON="$(python app.py --health)"
          echo "Health payload: ${HEALTH_JSON}"
          echo "${HEALTH_JSON}" > health.json
          python - <<'PY'
          import json
          with open("health.json", "r", encoding="utf-8") as f:
              payload = json.load(f)
          if payload.get("status") != "ok":
              raise SystemExit("Health status is not ok")
          print("Health monitor passed.")
          PY
